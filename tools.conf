# Tool config repos — each lives hidden in $HOME and ships its OWN install.sh;
# this repo only clones/updates them and calls that script (see basic/10-tools.sh).
# Order matters: zsh first — later tools assume the shell is in place.
#
# Format: name|clone URL|destination|scope
#   scope (optional 4th field): "gui" = desktop-only, skipped on a server.
#   Omitted = a CLI tool installed everywhere (zsh, vim, tmux).
# ~ expands to $HOME.
zsh|https://github.com/Spuppateddu/zshrc.git|~/.zsh
vim|https://github.com/Spuppateddu/vimrc.git|~/.vim
tmux|https://github.com/Spuppateddu/tmuxrc.git|~/.tmuxrc
alacritty|https://github.com/Spuppateddu/alacritty-config.git|~/.alacritty|gui
i3|https://github.com/Spuppateddu/i3rc.git|~/.i3rc|gui
